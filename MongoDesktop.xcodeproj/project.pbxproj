			shellScript = "set -euo pipefail\n\nMONGO_PREFIX=\"/opt/homebrew/opt/mongo-c-driver\"\nif [ -d \"/usr/local/opt/mongo-c-driver\" ]; then\n  MONGO_PREFIX=\"/usr/local/opt/mongo-c-driver\"\nfi\n\nZSTD_PREFIX=\"/opt/homebrew/opt/zstd\"\nif [ -d \"/usr/local/opt/zstd\" ]; then\n  ZSTD_PREFIX=\"/usr/local/opt/zstd\"\nfi\n\nLIB_DIR=\"$MONGO_PREFIX/lib\"\nZSTD_LIB_DIR=\"$ZSTD_PREFIX/lib\"\nFRAMEWORKS_DIR=\"${TARGET_BUILD_DIR}/${FRAMEWORKS_FOLDER_PATH}\"\nMACOS_DIR=\"${TARGET_BUILD_DIR}/${PRODUCT_NAME}.app/Contents/MacOS\"\n\nmkdir -p \"$FRAMEWORKS_DIR\"\n\ncopy_lib_from() {\n  local name=\"$1\"\n  local dir=\"$2\"\n  local destination=\"$FRAMEWORKS_DIR/$name\"\n  if [ -f \"$dir/$name\" ]; then\n    /bin/cp -f \"$dir/$name\" \"$destination\"\n    /usr/bin/codesign --remove-signature \"$destination\" >/dev/null 2>&1 || true\n  else\n    echo \"warning: $name not found at $dir\"\n  fi\n}\n\ncopy_lib_from libmongoc2.2.dylib \"$LIB_DIR\"\ncopy_lib_from libbson2.2.dylib \"$LIB_DIR\"\ncopy_lib_from libzstd.1.dylib \"$ZSTD_LIB_DIR\"\n\nif [ -f \"$FRAMEWORKS_DIR/libmongoc2.2.dylib\" ]; then\n  /usr/bin/install_name_tool -id \"@rpath/libmongoc2.2.dylib\" \"$FRAMEWORKS_DIR/libmongoc2.2.dylib\" || true\n  /usr/bin/install_name_tool -change \"/opt/homebrew/opt/mongo-c-driver/lib/libbson2.2.dylib\" \"@rpath/libbson2.2.dylib\" \"$FRAMEWORKS_DIR/libmongoc2.2.dylib\" || true\n  /usr/bin/install_name_tool -change \"/usr/local/opt/mongo-c-driver/lib/libbson2.2.dylib\" \"@rpath/libbson2.2.dylib\" \"$FRAMEWORKS_DIR/libmongoc2.2.dylib\" || true\n  /usr/bin/install_name_tool -change \"/opt/homebrew/opt/zstd/lib/libzstd.1.dylib\" \"@rpath/libzstd.1.dylib\" \"$FRAMEWORKS_DIR/libmongoc2.2.dylib\" || true\n  /usr/bin/install_name_tool -change \"/usr/local/opt/zstd/lib/libzstd.1.dylib\" \"@rpath/libzstd.1.dylib\" \"$FRAMEWORKS_DIR/libmongoc2.2.dylib\" || true\nfi\n\nif [ -f \"$FRAMEWORKS_DIR/libbson2.2.dylib\" ]; then\n  /usr/bin/install_name_tool -id \"@rpath/libbson2.2.dylib\" \"$FRAMEWORKS_DIR/